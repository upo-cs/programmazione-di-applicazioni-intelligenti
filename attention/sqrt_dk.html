<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perché dividere per √d_k?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <style>
    :root {
      --bg-page: #f8f7f4;
      --bg-primary: #ffffff;
      --bg-secondary: #F1EFE8;
      --text-primary: #2c2c2a;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --border-light: #e5e4df;
      --border-mid: #b4b2a9;
      --purple-50: #EEEDFE;
      --purple-100: #DDDCFD;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --teal-50: #E1F5EE;
      --teal-600: #0F6E56;
      --teal-800: #085041;
      --coral-50: #FAECE7;
      --coral-500: #C04E28;
      --coral-600: #993C1D;
      --coral-800: #712B13;
      --red-500: #D94040;
      --green-500: #2D9B5E;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .sub { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem; max-width: 520px; line-height: 1.5; }

    .card-wrap {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 760px;
      width: 100%;
    }
    .card-wrap .katex { font-size: 1.15em; }

    /* --- Slider --- */
    .slider-section {
      text-align: center;
      margin-bottom: 20px;
    }
    .slider-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .slider-label .katex { font-size: 1.05em; }
    .slider-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .slider-val {
      font-size: 28px;
      font-weight: 700;
      color: var(--purple-800);
      min-width: 60px;
      text-align: center;
    }
    .slider-bounds {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 320px;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-secondary);
      outline: none;
      border: 0.5px solid var(--border-light);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--purple-600);
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--purple-600);
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* --- Variance indicator --- */
    .variance-section {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .var-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: 8px;
      padding: 10px 16px;
      text-align: center;
      min-width: 200px;
    }
    .var-card .var-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .var-card .var-value {
      font-size: 18px;
      font-weight: 700;
    }
    .var-card .var-value .katex { font-size: 1.0em; }
    .var-card .var-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    /* --- Two-column comparison --- */
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) {
      .comparison { grid-template-columns: 1fr; }
    }
    .comp-col {
      border-radius: 10px;
      padding: 16px;
    }
    .comp-col.no-scale {
      background: var(--coral-50);
      border: 1px solid rgba(153,60,29,0.15);
    }
    .comp-col.with-scale {
      background: var(--teal-50);
      border: 1px solid rgba(15,110,86,0.15);
    }
    .comp-title {
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .no-scale .comp-title { color: var(--coral-800); }
    .with-scale .comp-title { color: var(--teal-800); }
    .comp-formula {
      text-align: center;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .comp-formula .katex { font-size: 1.05em; }

    /* --- Bar chart --- */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bar-label {
      font-size: 12px;
      font-weight: 500;
      width: 56px;
      text-align: right;
      flex-shrink: 0;
      color: var(--text-secondary);
    }
    .bar-track {
      flex: 1;
      height: 22px;
      background: rgba(255,255,255,0.5);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.35s ease;
      min-width: 1px;
    }
    .no-scale .bar-fill { background: var(--coral-500); }
    .with-scale .bar-fill { background: var(--teal-600); }
    .bar-pct {
      font-size: 11px;
      font-weight: 600;
      width: 44px;
      text-align: left;
      flex-shrink: 0;
    }
    .no-scale .bar-pct { color: var(--coral-800); }
    .with-scale .bar-pct { color: var(--teal-800); }

    /* --- Stats --- */
    .comp-stats {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.06);
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
    }
    .stat-label { font-weight: 500; }
    .stat-value { font-weight: 600; }

    /* --- Health indicator --- */
    .health {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .health.good { background: rgba(45,155,94,0.12); color: var(--green-500); }
    .health.warn { background: rgba(193,78,40,0.12); color: var(--coral-600); }
    .health.bad  { background: rgba(217,64,64,0.12); color: var(--red-500); }
    .health-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .health.good .health-dot { background: var(--green-500); }
    .health.warn .health-dot { background: var(--coral-600); }
    .health.bad  .health-dot { background: var(--red-500); }

    /* --- Note --- */
    .note-box {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .note-box .katex { font-size: 1.0em; }
  </style>
</head>

<body>
  <h1 id="title"></h1>
  <p class="sub" id="subtitle"></p>

  <div class="card-wrap">
    <div class="slider-section">
      <div class="slider-label" id="slider-label"></div>
      <div class="slider-row">
        <span class="slider-bounds">3</span>
        <input type="range" id="dk-slider" min="3" max="512" value="3" step="1">
        <span class="slider-bounds">512</span>
        <div class="slider-val" id="dk-value">3</div>
      </div>
    </div>

    <div class="variance-section" id="variance-section"></div>

    <div class="comparison">
      <div class="comp-col no-scale" id="col-no-scale">
        <div class="comp-title" id="ns-title"></div>
        <div class="comp-formula" id="ns-formula"></div>
        <div class="bar-chart" id="ns-bars"></div>
        <div class="comp-stats" id="ns-stats"></div>
      </div>
      <div class="comp-col with-scale" id="col-with-scale">
        <div class="comp-title" id="ws-title"></div>
        <div class="comp-formula" id="ws-formula"></div>
        <div class="bar-chart" id="ws-bars"></div>
        <div class="comp-stats" id="ws-stats"></div>
      </div>
    </div>

    <div class="note-box" id="note-box"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script>
    const K = katex;
    const ro = { throwOnError: false };
    function tex(t) { return K.renderToString(t, ro); }

    const tokens = ['Il', 'gatto', 'si', 'sedette', 'sul', 'tappeto'];
    const N = tokens.length;

    // Seeded PRNG (mulberry32) per risultati riproducibili
    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // Genera valore ~N(0,1) con Box-Muller
    function randn(rng) {
      let u, v;
      do { u = rng(); } while (u === 0);
      v = rng();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    function softmax(arr) {
      const max = Math.max(...arr);
      const exps = arr.map(v => Math.exp(v - max));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map(e => e / sum);
    }

    function entropy(probs) {
      // Normalizzata: H / log(n) in [0, 1]
      const logN = Math.log(N);
      let h = 0;
      probs.forEach(p => { if (p > 1e-12) h -= p * Math.log(p); });
      return h / logN;
    }

    function computeScores(dk) {
      // Genera q (query: "sedette") e 6 vettori k, tutti in R^dk
      const rng = mulberry32(42);
      const q = Array.from({ length: dk }, () => randn(rng));
      const ks = Array.from({ length: N }, () =>
        Array.from({ length: dk }, () => randn(rng))
      );
      // Dot products
      return ks.map(k => q.reduce((s, v, j) => s + v * k[j], 0));
    }

    function renderStatic() {
      document.getElementById('title').innerHTML = 'Perché dividere per ' + tex('\\sqrt{d_k}') + '?';
      document.getElementById('subtitle').innerHTML =
        'Trascina lo slider per aumentare ' + tex('d_k')
        + ' e osserva come il softmax reagisce senza e con lo scaling';

      document.getElementById('slider-label').innerHTML =
        'Dimensione delle proiezioni ' + tex('d_k');

      document.getElementById('ns-title').textContent = 'Senza scaling';
      document.getElementById('ns-formula').innerHTML = tex('\\text{softmax}(q \\cdot k_i)');

      document.getElementById('ws-title').textContent = 'Con scaling';
      document.getElementById('ws-formula').innerHTML = tex('\\text{softmax}\\!\\left(\\dfrac{q \\cdot k_i}{\\sqrt{d_k}}\\right)');
    }

    function render() {
      const dk = parseInt(document.getElementById('dk-slider').value);
      document.getElementById('dk-value').textContent = dk;

      const rawScores = computeScores(dk);
      const sqrtDk = Math.sqrt(dk);
      const scaledScores = rawScores.map(s => s / sqrtDk);

      const alphasNoScale = softmax(rawScores);
      const alphasScaled = softmax(scaledScores);

      // Variance cards
      const rawVar = rawScores.reduce((s, v) => s + v * v, 0) / N;
      const scaledVar = scaledScores.reduce((s, v) => s + v * v, 0) / N;

      const vs = document.getElementById('variance-section');
      vs.innerHTML = '';

      const vc1 = document.createElement('div');
      vc1.className = 'var-card';
      vc1.innerHTML =
        '<div class="var-title">Varianza attesa di ' + tex('q \\cdot k') + '</div>' +
        '<div class="var-value" style="color:var(--purple-800)">' + tex('\\text{Var} = d_k = ' + dk) + '</div>' +
        '<div class="var-sub">Cresce linearmente con ' + tex('d_k') + '</div>';
      vs.appendChild(vc1);

      const vc2 = document.createElement('div');
      vc2.className = 'var-card';
      vc2.innerHTML =
        '<div class="var-title">Deviazione standard degli score grezzi</div>' +
        '<div class="var-value" style="color:var(--coral-800)">' + tex('\\sigma \\approx \\sqrt{' + dk + '} = ' + sqrtDk.toFixed(1)) + '</div>' +
        '<div class="var-sub">Senza scaling: score fino a ' + tex('\\pm' + (sqrtDk * 2.5).toFixed(0)) + '</div>';
      vs.appendChild(vc2);

      const vc3 = document.createElement('div');
      vc3.className = 'var-card';
      vc3.innerHTML =
        '<div class="var-title">Dopo scaling ' + tex('\\div \\sqrt{d_k}') + '</div>' +
        '<div class="var-value" style="color:var(--teal-800)">' + tex('\\sigma \\approx 1') + '</div>' +
        '<div class="var-sub">Sempre ~1, indipendente da ' + tex('d_k') + '</div>';
      vs.appendChild(vc3);

      // Render bars
      renderBars('ns-bars', alphasNoScale, 'no-scale');
      renderBars('ws-bars', alphasScaled, 'with-scale');

      // Stats
      const maxNS = Math.max(...alphasNoScale);
      const maxWS = Math.max(...alphasScaled);
      const entNS = entropy(alphasNoScale);
      const entWS = entropy(alphasScaled);

      const healthNS = entNS < 0.3 ? 'bad' : entNS < 0.7 ? 'warn' : 'good';
      const healthWS = entWS < 0.3 ? 'bad' : entWS < 0.7 ? 'warn' : 'good';
      const healthLabelNS = entNS < 0.3 ? 'Saturato' : entNS < 0.7 ? 'Concentrato' : 'Distribuito';
      const healthLabelWS = entWS < 0.3 ? 'Saturato' : entWS < 0.7 ? 'Concentrato' : 'Distribuito';

      document.getElementById('ns-stats').innerHTML =
        '<div class="stat-row"><span class="stat-label">Peso massimo</span><span class="stat-value">' + (maxNS * 100).toFixed(1) + '%</span></div>' +
        '<div class="stat-row"><span class="stat-label">Entropia normalizzata</span><span class="stat-value">' + entNS.toFixed(3) + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Stato softmax</span><span class="health ' + healthNS + '"><span class="health-dot"></span>' + healthLabelNS + '</span></div>';

      document.getElementById('ws-stats').innerHTML =
        '<div class="stat-row"><span class="stat-label">Peso massimo</span><span class="stat-value">' + (maxWS * 100).toFixed(1) + '%</span></div>' +
        '<div class="stat-row"><span class="stat-label">Entropia normalizzata</span><span class="stat-value">' + entWS.toFixed(3) + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Stato softmax</span><span class="health ' + healthWS + '"><span class="health-dot"></span>' + healthLabelWS + '</span></div>';

      // Note
      const noteEl = document.getElementById('note-box');
      if (dk <= 10) {
        noteEl.innerHTML = '<b>Con ' + tex('d_k = ' + dk) + '</b> la differenza è minima: gli score sono piccoli e il softmax lavora nella zona lineare in entrambi i casi. Prova ad aumentare ' + tex('d_k') + ' verso 64 o 512 per vedere l\'effetto.';
      } else if (dk <= 128) {
        noteEl.innerHTML = '<b>Con ' + tex('d_k = ' + dk) + '</b> si comincia a vedere la differenza. Senza scaling, gli score hanno deviazione standard ' + tex('\\sigma \\approx ' + sqrtDk.toFixed(1)) + ': il softmax concentra quasi tutta la probabilità su un solo token. Con lo scaling, la distribuzione resta espressiva.';
      } else {
        noteEl.innerHTML = '<b>Con ' + tex('d_k = ' + dk) + '</b> l\'effetto è drammatico. Senza scaling, la colonna di sinistra è quasi <b>one-hot</b>: un token prende quasi il 100%. Il gradiente del softmax in questa zona è praticamente zero ' + tex('\\rightarrow') + ' il modello non impara. Lo scaling a destra mantiene la distribuzione nella zona utile.';
      }
    }

    function renderBars(containerId, alphas, mode) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      const maxA = Math.max(...alphas);

      alphas.forEach((a, i) => {
        const row = document.createElement('div');
        row.className = 'bar-row';

        const label = document.createElement('div');
        label.className = 'bar-label';
        label.textContent = tokens[i];

        const track = document.createElement('div');
        track.className = 'bar-track';

        const fill = document.createElement('div');
        fill.className = 'bar-fill';
        fill.style.width = (a / maxA * 100) + '%';
        fill.style.opacity = 0.4 + (a / maxA) * 0.6;
        track.appendChild(fill);

        const pct = document.createElement('div');
        pct.className = 'bar-pct';
        pct.textContent = (a * 100).toFixed(1) + '%';

        row.appendChild(label);
        row.appendChild(track);
        row.appendChild(pct);
        container.appendChild(row);
      });
    }

    renderStatic();
    render();

    document.getElementById('dk-slider').addEventListener('input', render);
  </script>
</body>

</html>
